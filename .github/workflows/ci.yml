name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - uses: gradle/actions/setup-gradle@v4

      # Full build: unit tests, ArchUnit rules, property tests, and
      # Testcontainers integration tests (Docker is available on the runner)
      - run: ./gradlew build

      # The committed OpenAPI artifact is regenerated during the build;
      # any uncommitted drift fails CI
      - name: OpenAPI drift gate
        run: git diff --exit-code docs/openapi.json

      - name: Docker image build
        run: docker build -t buoy:ci .

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test
